services:
  postgres:
    image: postgres:15
    container_name: sme_risk_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sme_risk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sme_risk_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sme_risk_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/sme_risk_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-super-secret-jwt-key-2026
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GEMINI_API_KEY: your_gemini_key_here
      MODEL_PATH: pipeline.pkl
      AUTO_CREATE_TABLES: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sme_risk_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/sme_risk_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-super-secret-jwt-key-2026
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GEMINI_API_KEY: your_gemini_key_here
      MODEL_PATH: pipeline.pkl
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sme_risk_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: